<!DOCTYPE html>
<html>
<head>
<title>BAS Graphic Generator</title>

<style>
body{
    font-family:Arial;
    background:#1e1e1e;
    color:white;
    text-align:center;
    margin:0;
    padding:0;
}

h1{
    margin-top:20px;
}

.toolbar{
    margin-top:20px;
}

.toolbtn{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:8px;
    background:#444;
    color:white;
    cursor:pointer;
    font-weight:bold;
}

.toolbtn.active{
    background:#16a34a;
}

.container{
    position:relative;
    display:inline-block;
    margin-top:20px;
}

#plan{
    max-width:1200px;
    border:2px solid #555;
}

#overlay{
    position:absolute;
    left:0;
    top:0;
    cursor:crosshair;
}

.bottom{
    margin-top:20px;
    margin-bottom:40px;
}

button.main{
    padding:15px 25px;
    border:none;
    border-radius:10px;
    background:#16a34a;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    margin:10px;
}
</style>

</head>

<body>

<h1>BAS Graphic Generator</h1>

<form action="/upload" method="POST" enctype="multipart/form-data">
    <input type="file" name="file" required>
    <button class="main" type="submit">Upload Plan</button>
</form>

{% if image %}

<div class="toolbar">
    <button class="toolbtn active" id="vavBtn">Add VAV</button>
    <button class="toolbtn" id="ahuBtn">Add AHU</button>
    <button class="toolbtn" id="ductBtn">Add Duct</button>
    <button class="toolbtn" id="curveBtn">Add Curved Duct</button>
    <button class="toolbtn" id="selectBtn">Select / Move</button>
    <button class="toolbtn" id="deleteBtn">Delete</button>
</div>

<div class="container">
    <img id="plan" src="data:image/png;base64,{{image}}">
    <canvas id="overlay"></canvas>
</div>

<div class="bottom">
    <button class="main" onclick="saveProject()">Save Project</button>
    <button class="main" onclick="loadProject()">Load Project</button>
    <button class="main" onclick="generateGraphic()">Generate Graphic</button>
</div>

<script>

let currentTool = "VAV";

const canvas = document.getElementById("overlay");
const img = document.getElementById("plan");
const ctx = canvas.getContext("2d");

let points = [];
let ducts = [];

let ductStart = null;
let movingObject = null;

img.onload = ()=>{
    canvas.width = img.clientWidth;
    canvas.height = img.clientHeight;
    draw();
};

document.getElementById("vavBtn").onclick = ()=>setTool("VAV");
document.getElementById("ahuBtn").onclick = ()=>setTool("AHU");
document.getElementById("ductBtn").onclick = ()=>setTool("DUCT");
document.getElementById("curveBtn").onclick = ()=>setTool("CURVE");
document.getElementById("selectBtn").onclick = ()=>setTool("SELECT");
document.getElementById("deleteBtn").onclick = ()=>setTool("DELETE");

function setTool(tool){

    currentTool = tool;

    document.querySelectorAll(".toolbtn").forEach(btn=>{
        btn.classList.remove("active");
    });

    if(tool=="VAV") document.getElementById("vavBtn").classList.add("active");
    if(tool=="AHU") document.getElementById("ahuBtn").classList.add("active");
    if(tool=="DUCT") document.getElementById("ductBtn").classList.add("active");
    if(tool=="CURVE") document.getElementById("curveBtn").classList.add("active");
    if(tool=="SELECT") document.getElementById("selectBtn").classList.add("active");
    if(tool=="DELETE") document.getElementById("deleteBtn").classList.add("active");
}

canvas.addEventListener("click",(e)=>{

    const rect = canvas.getBoundingClientRect();

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    if(currentTool=="VAV"){
        points.push({
            type:"VAV",
            x:x,
            y:y
        });
    }

    else if(currentTool=="AHU"){
        points.push({
            type:"AHU",
            x:x,
            y:y
        });
    }

    else if(currentTool=="DUCT"){

        if(!ductStart){
            ductStart = {x,y};
        }
        else{

            ducts.push({
                type:"straight",
                x1:ductStart.x,
                y1:ductStart.y,
                x2:x,
                y2:y
            });

            ductStart = null;
        }
    }

    else if(currentTool=="CURVE"){

        if(!ductStart){
            ductStart = {x,y};
        }
        else{

            ducts.push({
                type:"curve",
                x1:ductStart.x,
                y1:ductStart.y,
                cx:(ductStart.x+x)/2,
                cy:(ductStart.y+y)/2 - 80,
                x2:x,
                y2:y
            });

            ductStart = null;
        }
    }

    else if(currentTool=="DELETE"){

        points = points.filter(p=>{
            return Math.abs(p.x-x)>20 || Math.abs(p.y-y)>20;
        });

        ducts = ducts.filter(d=>{
            return Math.abs(d.x1-x)>20 || Math.abs(d.y1-y)>20;
        });
    }

    draw();
});

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ducts.forEach(d=>{

        ctx.strokeStyle = "#8b8b8b";
        ctx.lineWidth = 10;

        ctx.beginPath();

        if(d.type=="curve"){

            ctx.moveTo(d.x1,d.y1);

            ctx.quadraticCurveTo(
                d.cx,
                d.cy,
                d.x2,
                d.y2
            );
        }
        else{

            ctx.moveTo(d.x1,d.y1);
            ctx.lineTo(d.x2,d.y2);
        }

        ctx.stroke();
    });

    points.forEach(p=>{

        if(p.type=="AHU"){

            ctx.fillStyle="#2f9e1f";
            ctx.fillRect(p.x-35,p.y-25,70,50);

            ctx.strokeStyle="#1d5e12";
            ctx.lineWidth=4;
            ctx.strokeRect(p.x-35,p.y-25,70,50);
        }

        if(p.type=="VAV"){

            ctx.fillStyle="#c6865c";
            ctx.fillRect(p.x-18,p.y-18,36,36);

            ctx.strokeStyle="#7a3b12";
            ctx.lineWidth=4;
            ctx.strokeRect(p.x-18,p.y-18,36,36);
        }
    });
}

async function generateGraphic(){

    const scaleX = img.naturalWidth / img.clientWidth;
    const scaleY = img.naturalHeight / img.clientHeight;

    const exportPoints = points.map(p=>({
        type:p.type,
        x:Math.round(p.x*scaleX),
        y:Math.round(p.y*scaleY)
    }));

    const exportDucts = ducts.map(d=>{

        if(d.type=="curve"){

            return{
                type:"curve",
                x1:Math.round(d.x1*scaleX),
                y1:Math.round(d.y1*scaleY),
                cx:Math.round(d.cx*scaleX),
                cy:Math.round(d.cy*scaleY),
                x2:Math.round(d.x2*scaleX),
                y2:Math.round(d.y2*scaleY)
            };
        }

        return{
            type:"straight",
            x1:Math.round(d.x1*scaleX),
            y1:Math.round(d.y1*scaleY),
            x2:Math.round(d.x2*scaleX),
            y2:Math.round(d.y2*scaleY)
        };
    });

    const res = await fetch("/generate_manual",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            points:exportPoints,
            ducts:exportDucts
        })
    });

    const data = await res.json();

    if(data.success){
        window.location.href="/result";
    }
}

async function saveProject(){

    const scaleX = img.naturalWidth / img.clientWidth;
    const scaleY = img.naturalHeight / img.clientHeight;

    const exportPoints = points.map(p=>({
        type:p.type,
        x:Math.round(p.x*scaleX),
        y:Math.round(p.y*scaleY)
    }));

    const exportDucts = ducts.map(d=>{

        if(d.type=="curve"){

            return{
                type:"curve",
                x1:Math.round(d.x1*scaleX),
                y1:Math.round(d.y1*scaleY),
                cx:Math.round(d.cx*scaleX),
                cy:Math.round(d.cy*scaleY),
                x2:Math.round(d.x2*scaleX),
                y2:Math.round(d.y2*scaleY)
            };
        }

        return{
            type:"straight",
            x1:Math.round(d.x1*scaleX),
            y1:Math.round(d.y1*scaleY),
            x2:Math.round(d.x2*scaleX),
            y2:Math.round(d.y2*scaleY)
        };
    });

    const res = await fetch("/save_project",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            points:exportPoints,
            ducts:exportDucts
        })
    });

    const data = await res.json();

    if(data.success){
        alert("Project saved!");
    }
}

async function loadProject(){

    const res = await fetch("/load_project");
    const data = await res.json();

    if(!data.success){
        alert(data.error);
        return;
    }

    const scaleX = img.clientWidth / img.naturalWidth;
    const scaleY = img.clientHeight / img.naturalHeight;

    points = data.project.points.map(p=>({
        type:p.type,
        x:p.x*scaleX,
        y:p.y*scaleY
    }));

    ducts = data.project.ducts.map(d=>{

        if(d.type=="curve"){

            return{
                type:"curve",
                x1:d.x1*scaleX,
                y1:d.y1*scaleY,
                cx:d.cx*scaleX,
                cy:d.cy*scaleY,
                x2:d.x2*scaleX,
                y2:d.y2*scaleY
            };
        }

        return{
            type:"straight",
            x1:d.x1*scaleX,
            y1:d.y1*scaleY,
            x2:d.x2*scaleX,
            y2:d.y2*scaleY
        };
    });

    draw();

    alert("Project loaded!");
}

</script>

{% endif %}

</body>
</html>
